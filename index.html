<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Leader Questions App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navigation -->
  <a href="summary.html">View Summary</a>

  <h1>Select a Leader</h1>

  <div id="leaders-container"></div>

  <hr>

  <h2 id="selected-leader"></h2>

  <!-- ✅ Leader Image (REQUIRED) -->
  <img
    id="leader-image"
    alt="Leader image"
    style="display:none; width:150px; margin:10px 0; border:1px solid #ccc;"
  >

  <!-- Question Input -->
  <div id="question-input-area" style="display:none;">
    <input id="question-input" placeholder="Type your question">
    <button id="add-question-btn">Add Question</button>
    <p id="question-limit-msg"></p>
  </div>

  <!-- Questions List -->
  <ul id="questions-container"></ul>

  <!-- IMPORTANT: must be module -->
  <script type="module" src="script.js"></script>

</body>
</html>
